name: northstyle

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  docker-proxy:
    image: alpine/socat
    container_name: northstyle-docker-proxy
    command:
      - -t
      - "900"
      - TCP-LISTEN:2375,fork,reuseaddr
      - UNIX-CONNECT:/var/run/docker.sock
    restart: unless-stopped
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  postgres-oltp:
    build:
      context: ./docker/postgres
    image: northstyle/postgres-oltp:18.4
    container_name: northstyle-postgres-oltp
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRBYTE_CDC_USER: ${AIRBYTE_CDC_USER}
      AIRBYTE_CDC_PASSWORD: ${AIRBYTE_CDC_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    volumes:
      - postgres_oltp_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  airbyte-db:
    image: airbyte/db:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-db
    logging: *default-logging
    restart: unless-stopped
    environment:
      CONFIG_DATABASE_PASSWORD: ${CONFIG_DATABASE_PASSWORD}
      CONFIG_DATABASE_URL: ${CONFIG_DATABASE_URL}
      CONFIG_DATABASE_USER: ${CONFIG_DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USER}
    volumes:
      - airbyte_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  airbyte-bootloader:
    image: airbyte/bootloader:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-bootloader
    logging: *default-logging
    environment:
      AIRBYTE_VERSION: ${AIRBYTE_VERSION}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      LOCAL_CONNECTOR_CATALOG_PATH: ${LOCAL_CONNECTOR_CATALOG_PATH}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      airbyte-db:
        condition: service_healthy

  airbyte-worker:
    image: airbyte/worker:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-worker
    logging: *default-logging
    restart: unless-stopped
    environment:
      ACTIVITY_INITIAL_DELAY_BETWEEN_ATTEMPTS_SECONDS: ${ACTIVITY_INITIAL_DELAY_BETWEEN_ATTEMPTS_SECONDS}
      ACTIVITY_MAX_ATTEMPT: ${ACTIVITY_MAX_ATTEMPT}
      ACTIVITY_MAX_DELAY_BETWEEN_ATTEMPTS_SECONDS: ${ACTIVITY_MAX_DELAY_BETWEEN_ATTEMPTS_SECONDS}
      AIRBYTE_VERSION: ${AIRBYTE_VERSION}
      APPLY_FIELD_SELECTION: ${AUTO_APPLY_FIELD_SELECTION}
      AUTO_DETECT_SCHEMA: ${AUTO_DETECT_SCHEMA}
      AUTO_DISABLE_FAILING_CONNECTIONS: ${AUTO_DISABLE_FAILING_CONNECTIONS}
      CONFIG_DATABASE_PASSWORD: ${CONFIG_DATABASE_PASSWORD}
      CONFIG_DATABASE_URL: ${CONFIG_DATABASE_URL}
      CONFIG_DATABASE_USER: ${CONFIG_DATABASE_USER}
      CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: ${CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION}
      CONFIG_ROOT: ${CONFIG_ROOT}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE}
      DOCKER_HOST: docker-proxy:2375
      FIELD_SELECTION_WORKSPACES: ${FIELD_SELECTION_WORKSPACES}
      INTERNAL_API_HOST: ${INTERNAL_API_HOST}
      JOBS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: ${JOBS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION}
      JOB_ERROR_REPORTING_STRATEGY: ${JOB_ERROR_REPORTING_STRATEGY}
      JOB_ERROR_REPORTING_SENTRY_DSN: ""
      JOB_MAIN_CONTAINER_CPU_LIMIT: ${JOB_MAIN_CONTAINER_CPU_LIMIT}
      JOB_MAIN_CONTAINER_CPU_REQUEST: ${JOB_MAIN_CONTAINER_CPU_REQUEST}
      JOB_MAIN_CONTAINER_MEMORY_LIMIT: ${JOB_MAIN_CONTAINER_MEMORY_LIMIT}
      JOB_MAIN_CONTAINER_MEMORY_REQUEST: ${JOB_MAIN_CONTAINER_MEMORY_REQUEST}
      LOCAL_DOCKER_MOUNT: ${LOCAL_DOCKER_MOUNT}
      LOCAL_ROOT: ${LOCAL_ROOT}
      LOG_CONNECTOR_MESSAGES: "true"
      LOG_LEVEL: ${LOG_LEVEL}
      MAX_CHECK_WORKERS: ${MAX_CHECK_WORKERS}
      MAX_DISCOVER_WORKERS: ${MAX_DISCOVER_WORKERS}
      MAX_NOTIFY_WORKERS: ${MAX_NOTIFY_WORKERS}
      MAX_SPEC_WORKERS: ${MAX_SPEC_WORKERS}
      MAX_SYNC_WORKERS: ${MAX_SYNC_WORKERS}
      METRIC_CLIENT: ${METRIC_CLIENT}
      MICRONAUT_ENVIRONMENTS: ${WORKERS_MICRONAUT_ENVIRONMENTS}
      NORMALIZATION_JOB_MAIN_CONTAINER_CPU_LIMIT: ${NORMALIZATION_JOB_MAIN_CONTAINER_CPU_LIMIT}
      NORMALIZATION_JOB_MAIN_CONTAINER_CPU_REQUEST: ${NORMALIZATION_JOB_MAIN_CONTAINER_CPU_REQUEST}
      NORMALIZATION_JOB_MAIN_CONTAINER_MEMORY_LIMIT: ${NORMALIZATION_JOB_MAIN_CONTAINER_MEMORY_LIMIT}
      NORMALIZATION_JOB_MAIN_CONTAINER_MEMORY_REQUEST: ${NORMALIZATION_JOB_MAIN_CONTAINER_MEMORY_REQUEST}
      OTEL_COLLECTOR_ENDPOINT: ${OTEL_COLLECTOR_ENDPOINT}
      SECRET_PERSISTENCE: ${SECRET_PERSISTENCE}
      SEGMENT_WRITE_KEY: ${SEGMENT_WRITE_KEY}
      SHOULD_RUN_NOTIFY_WORKFLOWS: ${SHOULD_RUN_NOTIFY_WORKFLOWS}
      STORAGE_BUCKET_ACTIVITY_PAYLOAD: ${STORAGE_BUCKET_ACTIVITY_PAYLOAD}
      STORAGE_BUCKET_LOG: ${STORAGE_BUCKET_LOG}
      STORAGE_BUCKET_STATE: ${STORAGE_BUCKET_STATE}
      STORAGE_BUCKET_WORKLOAD_OUTPUT: ${STORAGE_BUCKET_WORKLOAD_OUTPUT}
      STORAGE_TYPE: ${STORAGE_TYPE}
      SYNC_JOB_MAX_ATTEMPTS: ${SYNC_JOB_MAX_ATTEMPTS}
      SYNC_JOB_MAX_TIMEOUT_DAYS: ${SYNC_JOB_MAX_TIMEOUT_DAYS}
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TRACKING_STRATEGY: ${TRACKING_STRATEGY}
      USE_STREAM_CAPABLE_STATE: ${USE_STREAM_CAPABLE_STATE}
      WEBAPP_URL: ${WEBAPP_URL}
      WORKLOAD_API_HOST: ${WORKLOAD_API_URL}
      WORKER_ENVIRONMENT: ${WORKER_ENVIRONMENT}
      WORKFLOW_FAILURE_RESTART_DELAY_SECONDS: ${WORKFLOW_FAILURE_RESTART_DELAY_SECONDS}
      WORKSPACE_DOCKER_MOUNT: ${WORKSPACE_DOCKER_MOUNT}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT}
    volumes:
      - airbyte_workspace:${WORKSPACE_ROOT}
      - airbyte_local:${LOCAL_ROOT}
    depends_on:
      airbyte-bootloader:
        condition: service_completed_successfully
      airbyte-server:
        condition: service_started
        restart: true
      docker-proxy:
        condition: service_started

  airbyte-server:
    image: airbyte/server:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-server
    logging: *default-logging
    restart: unless-stopped
    environment:
      AIRBYTE_API_HOST: ${AIRBYTE_API_HOST}
      AIRBYTE_ROLE: ${AIRBYTE_ROLE}
      AIRBYTE_VERSION: ${AIRBYTE_VERSION}
      AUTO_DETECT_SCHEMA: ${AUTO_DETECT_SCHEMA}
      CONFIG_DATABASE_PASSWORD: ${CONFIG_DATABASE_PASSWORD}
      CONFIG_DATABASE_URL: ${CONFIG_DATABASE_URL}
      CONFIG_DATABASE_USER: ${CONFIG_DATABASE_USER}
      CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: ${CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION}
      CONFIG_ROOT: ${CONFIG_ROOT}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      GITHUB_STORE_BRANCH: ""
      JOBS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: ${JOBS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION}
      JOB_ERROR_REPORTING_STRATEGY: ${JOB_ERROR_REPORTING_STRATEGY}
      JOB_ERROR_REPORTING_SENTRY_DSN: ""
      JOB_MAIN_CONTAINER_CPU_LIMIT: ${JOB_MAIN_CONTAINER_CPU_LIMIT}
      JOB_MAIN_CONTAINER_CPU_REQUEST: ${JOB_MAIN_CONTAINER_CPU_REQUEST}
      JOB_MAIN_CONTAINER_MEMORY_LIMIT: ${JOB_MAIN_CONTAINER_MEMORY_LIMIT}
      JOB_MAIN_CONTAINER_MEMORY_REQUEST: ${JOB_MAIN_CONTAINER_MEMORY_REQUEST}
      LOG_LEVEL: ${LOG_LEVEL}
      MAX_NOTIFY_WORKERS: ${MAX_NOTIFY_WORKERS}
      MICRONAUT_ENVIRONMENTS: ${WORKERS_MICRONAUT_ENVIRONMENTS}
      NEW_SCHEDULER: ${NEW_SCHEDULER}
      SECRET_PERSISTENCE: ${SECRET_PERSISTENCE}
      SEGMENT_WRITE_KEY: ${SEGMENT_WRITE_KEY}
      SHOULD_RUN_NOTIFY_WORKFLOWS: ${SHOULD_RUN_NOTIFY_WORKFLOWS}
      STORAGE_BUCKET_ACTIVITY_PAYLOAD: ${STORAGE_BUCKET_ACTIVITY_PAYLOAD}
      STORAGE_BUCKET_LOG: ${STORAGE_BUCKET_LOG}
      STORAGE_BUCKET_STATE: ${STORAGE_BUCKET_STATE}
      STORAGE_BUCKET_WORKLOAD_OUTPUT: ${STORAGE_BUCKET_WORKLOAD_OUTPUT}
      STORAGE_TYPE: ${STORAGE_TYPE}
      TEMPORAL_HOST: ${TEMPORAL_HOST}
      TRACKING_STRATEGY: ${TRACKING_STRATEGY}
      WEBAPP_URL: ${WEBAPP_URL}
      WORKER_ENVIRONMENT: ${WORKER_ENVIRONMENT}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT}
      CONNECTOR_BUILDER_SERVER_API_HOST: ${CONNECTOR_BUILDER_SERVER_API_HOST}
    volumes:
      - airbyte_workspace:${WORKSPACE_ROOT}
      - airbyte_data:${CONFIG_ROOT}
      - airbyte_local:${LOCAL_ROOT}
    depends_on:
      airbyte-bootloader:
        condition: service_completed_successfully

  airbyte-webapp:
    image: airbyte/webapp:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-webapp
    logging: *default-logging
    restart: unless-stopped
    environment:
      AIRBYTE_SERVER_HOST: ${AIRBYTE_SERVER_HOST}
      CONNECTOR_BUILDER_API_HOST: ${CONNECTOR_BUILDER_API_HOST}
      INTERNAL_API_HOST: ${INTERNAL_API_HOST}
      KEYCLOAK_INTERNAL_HOST: localhost
      TRACKING_STRATEGY: ${TRACKING_STRATEGY}
    depends_on:
      airbyte-bootloader:
        condition: service_completed_successfully

  airbyte-temporal:
    image: airbyte/temporal:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-temporal
    logging: *default-logging
    restart: unless-stopped
    environment:
      DB: postgresql
      DB_PORT: ${DATABASE_PORT}
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development.yaml
      LOG_LEVEL: ${LOG_LEVEL}
      POSTGRES_PWD: ${DATABASE_PASSWORD}
      POSTGRES_SEEDS: ${DATABASE_HOST}
      POSTGRES_USER: ${DATABASE_USER}
    volumes:
      - ./airbyte/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig

  airbyte-cron:
    image: airbyte/cron:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-cron
    logging: *default-logging
    restart: unless-stopped
    environment:
      AIRBYTE_VERSION: ${AIRBYTE_VERSION}
      CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION: ${CONFIGS_DATABASE_MINIMUM_FLYWAY_MIGRATION_VERSION}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE}
      LOG_LEVEL: ${LOG_LEVEL}
      MICRONAUT_ENVIRONMENTS: ${CRON_MICRONAUT_ENVIRONMENTS}
      REMOTE_CONNECTOR_CATALOG_URL: ${REMOTE_CONNECTOR_CATALOG_URL}
      TEMPORAL_HISTORY_RETENTION_IN_DAYS: "30"
      UPDATE_DEFINITIONS_CRON_ENABLED: "true"
      WORKSPACE_ROOT: ${WORKSPACE_ROOT}
    volumes:
      - airbyte_workspace:${WORKSPACE_ROOT}
    depends_on:
      airbyte-bootloader:
        condition: service_completed_successfully

  airbyte-connector-builder-server:
    image: airbyte/connector-builder-server:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-connector-builder-server
    logging: *default-logging
    restart: unless-stopped
    environment:
      AIRBYTE_VERSION: ${AIRBYTE_VERSION}
      CDK_VERSION: ${CDK_VERSION}
      PYTHON_VERSION: ${PYTHON_VERSION}
    depends_on:
      airbyte-bootloader:
        condition: service_completed_successfully

  airbyte-proxy:
    image: airbyte/proxy:${AIRBYTE_VERSION}
    container_name: northstyle-airbyte-proxy
    restart: unless-stopped
    environment:
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD}
      BASIC_AUTH_PROXY_TIMEOUT: ${BASIC_AUTH_PROXY_TIMEOUT}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME}
    ports:
      - "${AIRBYTE_WEB_PORT}:8000"
      - "${AIRBYTE_API_PORT}:8001"
      - "${AIRBYTE_TUNNEL_PORT}:8003"
    depends_on:
      airbyte-webapp:
        condition: service_started
        restart: true
      airbyte-server:
        condition: service_started
        restart: true

volumes:
  postgres_oltp_data:
    name: northstyle_postgres_oltp_data
  airbyte_workspace:
    name: ${WORKSPACE_DOCKER_MOUNT}
  airbyte_data:
    name: ${DATA_DOCKER_MOUNT}
  airbyte_db:
    name: ${DB_DOCKER_MOUNT}
  airbyte_local:
    name: ${LOCAL_DOCKER_MOUNT}
