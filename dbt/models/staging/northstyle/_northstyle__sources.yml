version: 2

sources:
  - name: northstyle
    description: Raw Northstyle data loaded into Snowflake.
    database: northstyle
    schema: public
    tables:
      - name: customers
        description: Raw customer records replicated into Snowflake.
        columns:
          - name: id
            description: Unique identifier for a customer.
            tests:
              - not_null
              - unique
          - name: name
            description: Customer name from the source system.
          - name: created_at
            description: Timestamp when the customer was created.
          - name: ctid_fivetran_id
            description: Fivetran record identifier for the replicated row.
          - name: _fivetran_deleted
            description: Soft-delete flag from Fivetran.
          - name: _fivetran_synced
            description: Timestamp when Fivetran last synced the row.
