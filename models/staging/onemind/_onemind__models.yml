version: 2

models:
  - name: stg_customers
    description: Standardized customer records from the Onemind Snowflake source.
    columns:
      - name: customer_id
        description: Unique identifier for a customer.
      - name: customer_name
        description: Cleaned customer name.
      - name: created_at
        description: Timestamp when the customer was created.
      - name: customer_record_id
        description: Fivetran record identifier for the replicated row.
      - name: is_deleted
        description: Soft-delete flag from Fivetran.
      - name: fivetran_synced_at
        description: Timestamp when Fivetran last synced the row.
