version: 2

models:
  - name: int_customers
    description: Customer records prepared for marts, excluding Fivetran-deleted rows.
    columns:
      - name: customer_id
        description: Unique identifier for a customer.
      - name: customer_name
        description: Customer name ready for analytics consumption.
      - name: created_at
        description: Original customer creation timestamp.
      - name: created_date
        description: Date portion of the customer creation timestamp.
      - name: customer_record_id
        description: Fivetran record identifier for the replicated row.
      - name: fivetran_synced_at
        description: Timestamp when Fivetran last synced the row.
