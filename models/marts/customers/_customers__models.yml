version: 2

models:
  - name: dim_customers
    description: Final customer dimension model for analytics and reporting.
    columns:
      - name: customer_id
        description: Unique identifier for a customer.
        tests:
          - not_null
          - unique
      - name: customer_name
        description: Customer name.
      - name: created_at
        description: Original customer creation timestamp.
      - name: created_date
        description: Date when the customer was created.
      - name: customer_record_id
        description: Fivetran record identifier for the replicated row.
      - name: fivetran_synced_at
        description: Timestamp when Fivetran last synced the row.
